<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Skynet Downloads</title>
    <meta name="description" content="Download Skynet installers and portable ZIP builds.">
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --panel: #171d24;
        --text: #f5f7fb;
        --muted: #a7b1bd;
        --accent: #29d391;
        --accent-strong: #18ad74;
        --border: #2a3440;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .download-panel {
        width: min(100%, 680px);
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: clamp(28px, 6vw, 56px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 7vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
      }

      .actions {
        display: grid;
        gap: 14px;
        margin-top: 32px;
      }

      .download-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 64px;
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        text-decoration: none;
      }

      .download-link:hover,
      .download-link:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      .download-link.primary {
        border-color: var(--accent-strong);
        background: var(--accent);
        color: #07110c;
        font-weight: 700;
      }

      .label {
        font-size: 18px;
      }

      .meta {
        color: inherit;
        font-size: 14px;
        opacity: 0.76;
      }

    </style>
  </head>
  <body>
    <main>
      <section class="download-panel" aria-labelledby="title">
        <h1 id="title">Skynet Downloads</h1>
        <p>Latest Windows build with bundled Hamlib support.</p>

        <div class="actions" aria-label="Download links">
          <a class="download-link primary" href="https://github.com/matteo-avigni/Skynet-Downloads/releases/latest/download/skynet-win-x64.msi">
            <span class="label">Windows installer</span>
            <span class="meta">MSI</span>
          </a>
          <a class="download-link" href="https://github.com/matteo-avigni/Skynet-Downloads/releases/latest/download/skynet-win-x64.zip">
            <span class="label">Portable app package</span>
            <span class="meta">ZIP</span>
          </a>
        </div>

      </section>
    </main>
  </body>
</html>
